name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (checkout, build, test, brew style).
# No job writes to the repository, so the default token needs read-only scope
# (audit L5; matches release-artifacts.yml).
permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    # Pinned to macos-26 (GA February 2026, native Apple Silicon). macos-latest
    # still resolves to macOS 15 until a migration that begins 2026-06-15, and
    # macOS 15 lacks the macOS 26 SDK and Swift 6.2+. The runner's default Xcode
    # (26.2, stable) is used deliberately — no beta toolchain.
    runs-on: macos-26
    # Bounded so a hung test (e.g. a blocking call on the cooperative pool) fails
    # fast instead of running to GitHub's 6h default — that exact class of hang
    # once pinned CI for 6 hours. 30m is ~10x the observed build+test+benchmark time.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain version
        run: swift --version

      - name: Validate Homebrew formula
        run: |
          ruby -c Formula/goh.rb
          brew style Formula/goh.rb

      - name: Validate private release workflow
        run: bash Scripts/verify-private-release-workflow.sh

      - name: Validate dogfood kit
        run: bash Scripts/verify-dogfood-kit.sh

      - name: Build (warnings as errors)
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        # -warnings-as-errors also covers the test targets here: `swift build` above
        # builds only product targets, so without this flag test-code warnings
        # (including strict-concurrency warnings) would ride free into CI.
        run: swift test -Xswiftc -warnings-as-errors

      # The unified-vs-inline hashing measurement (Benchmarks/README.md §2) —
      # deterministic, no network, so it runs here. The number goes in the PR.
      - name: Hashing benchmark (unified vs inline)
        run: swift run -c release goh-bench hash-overhead 256
